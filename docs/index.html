<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>FBCMJ ESL Onboarding Guide</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="FBCMJ ESL Onboarding Guide">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <link rel="icon" type="image/png" href="_media/images/icons/favicon.png">
    <link rel="manifest" href="manifest.json">

    <!-- Theme: Simple -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

    <!-- Arabic-capable font (loads for all locales; used when lang=ar) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@100..900&display=swap" rel="stylesheet">

    <!-- Custom theme styles -->
    <link rel="stylesheet" href="css/theme-root.css">
    <link rel="stylesheet" href="css/theme-components.css">
</head>

<body>
    <div id="app">Please wait...</div>

    <script>
        // Shared weak gate helpers (client-side only, not real security)
        // GATE_ENABLED=false for now; keep helpers/handlers to restore later.
        (function () {
            var GATE_ENABLED = false;
            var STORAGE_KEY = 'fbcmj_esl_unlocked';
            var COVER_PATHS = { '/': true, '/en/': true, '/es/': true, '/ar/': true };

            function getLocaleFromHash(hash) {
                var cleaned = (hash || '').replace(/^#/, '').split('?')[0];
                if (cleaned.indexOf('/es') === 0) {
                    return 'es';
                }
                if (cleaned.indexOf('/ar') === 0) {
                    return 'ar';
                }
                if (cleaned.indexOf('/en') === 0) {
                    return 'en';
                }
                return '';
            }

            function getTargetHash() {
                var locale = getLocaleFromHash(window.location.hash) || 'en';
                return '#/' + locale + '/README';
            }

            function isUnlocked() {
                try {
                    return window.sessionStorage && window.sessionStorage.getItem(STORAGE_KEY) === '1';
                } catch (e) {
                    return false;
                }
            }

            function setUnlocked() {
                try {
                    window.sessionStorage && window.sessionStorage.setItem(STORAGE_KEY, '1');
                } catch (e) {
                    // ignore
                }
            }

            function isCoverHash(hash) {
                if (!hash || hash === '#') {
                    return true;
                }

                var cleaned = hash.replace(/^#/, '');
                if (cleaned === '' || cleaned === '/' || cleaned === '/?') {
                    return true;
                }

                var path = cleaned.split('?')[0];
                if (path.charAt(path.length - 1) !== '/') {
                    path = path + '/';
                }
                return Boolean(COVER_PATHS[path] || COVER_PATHS['/' + path.replace(/^\//, '')]);
            }

            function redirectToCoverIfLocked() {
                if (!GATE_ENABLED) {
                    return;
                }

                if (isUnlocked()) {
                    return;
                }

                if (!isCoverHash(window.location.hash)) {
                    var url = window.location.pathname + window.location.search + '#/';
                    window.location.replace(url);
                }
            }

            function redirectToTargetIfUnlocked() {
                if (!isUnlocked()) {
                    return;
                }

                if (isCoverHash(window.location.hash) || !window.location.hash || window.location.hash === '#') {
                    window.location.hash = getTargetHash();
                }
            }

            function applyDocumentLocale() {
                var locale = getLocaleFromHash(window.location.hash);
                var lang = locale || 'en';
                var dir = locale === 'ar' ? 'rtl' : 'ltr';
                document.documentElement.lang = lang;
                document.documentElement.dir = dir;
            }

            window.FBCMJ_GATE = {
                GATE_ENABLED: GATE_ENABLED,
                isUnlocked: isUnlocked,
                setUnlocked: setUnlocked,
                redirectToCoverIfLocked: redirectToCoverIfLocked,
                redirectToTargetIfUnlocked: redirectToTargetIfUnlocked,
                applyDocumentLocale: applyDocumentLocale,
                getLocaleFromHash: getLocaleFromHash,
                isCoverHash: isCoverHash,
            };

            // Alias kept for restore-ready cover form handler
            window.SIMPL_GATE = window.FBCMJ_GATE;

            window.addEventListener('hashchange', function () {
                redirectToCoverIfLocked();
                applyDocumentLocale();
            });
            redirectToCoverIfLocked();
            applyDocumentLocale();
        })();
    </script>

    <script>
        window.$docsify = {
            name: 'FBCMJ ESL Onboarding Guide',
            nameLink: '#/',
            repo: '',
            coverpage: ['/', '/en/', '/es/', '/ar/'],
            onlyCover: true,
            fallbackLanguages: ['en'],
            plugins: [
                function (hook) {
                    // Docsify keeps .cover.show when switching covers, so replay the
                    // same show-class transition used for cover ↔ guide.
                    var pendingCoverTransition = false;

                    function hashFromUrl(url) {
                        var index = String(url || '').indexOf('#');
                        return index >= 0 ? url.slice(index) : '#/';
                    }

                    window.addEventListener('hashchange', function (event) {
                        var gate = window.FBCMJ_GATE;
                        if (!gate || !gate.isCoverHash) {
                            return;
                        }

                        var fromHash = hashFromUrl(event.oldURL);
                        var toHash = window.location.hash || '#/';
                        if (!gate.isCoverHash(fromHash) || !gate.isCoverHash(toHash)) {
                            return;
                        }

                        pendingCoverTransition = true;
                        var cover = document.querySelector('section.cover');
                        if (cover) {
                            cover.classList.remove('show');
                        }
                    });

                    hook.doneEach(function () {
                        if (window.FBCMJ_GATE && window.FBCMJ_GATE.applyDocumentLocale) {
                            window.FBCMJ_GATE.applyDocumentLocale();
                        }

                        if (!pendingCoverTransition) {
                            return;
                        }

                        pendingCoverTransition = false;
                        var cover = document.querySelector('section.cover');
                        if (!cover) {
                            return;
                        }

                        // Docsify re-adds .show while rendering; replay the CSS transition.
                        cover.classList.remove('show');
                        void cover.offsetWidth;
                        requestAnimationFrame(function () {
                            cover.classList.add('show');
                        });
                    });
                },
            ],
        };

        // Kept for easy restore of the cover passphrase form
        window.handleSimplGate = function (event) {
            event.preventDefault();
            var form = event.target;
            var input = form.querySelector('#release-gate-input');
            var error = form.querySelector('#release-gate-error');
            var PASS = 'fbcmj-esl';

            if (!input) {
                return false;
            }

            if (input.value === PASS) {
                window.FBCMJ_GATE.setUnlocked();

                if (error) {
                    error.style.display = 'none';
                }

                window.FBCMJ_GATE.redirectToTargetIfUnlocked();
            } else if (error) {
                error.style.display = 'block';
            }

            return false;
        };
    </script>

    <!-- docsify -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

    <!-- docsify-themeable -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
</body>

</html>
